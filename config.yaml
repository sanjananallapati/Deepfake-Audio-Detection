# Configuration for the deepfake-audio-detection pipeline.
# These mirror the dataclass defaults in src/config.py; edit freely.
# Any field omitted here falls back to the code default.
# Point paths.* at your local copy of the Fake-or-Real dataset.

audio:
  sample_rate: 16000
  duration: 4.0
  mono: true
features:
  feature_type: logmel
  n_mels: 128
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  fmin: 20
  fmax: 8000
  top_db: 80.0
  normalize: instance
specaugment:
  enabled: true
  freq_mask_param: 16
  time_mask_param: 24
  n_freq_masks: 2
  n_time_masks: 2
waveaugment:
  enabled: true            # train-only; main lever for closing the train->test gap
  noise_prob: 0.5
  noise_snr_db: [5.0, 30.0]
  gain_prob: 0.5
  gain_db: 6.0
  shift_prob: 0.5
  shift_max_frac: 0.25
  polarity_prob: 0.5
model:
  name: specnet_cnn
  channels:
  - 32
  - 64
  - 128
  - 128
  fc_dim: 64
  dropout: 0.3
  num_classes: 2
train:
  epochs: 30
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  val_split: 0.15
  num_workers: 4
  early_stopping_patience: 7
  scheduler_patience: 3
  scheduler_factor: 0.5
  use_class_weights: true
  label_smoothing: 0.0
  seed: 42
  amp: true
paths:
  train_dir: data/for-norm/training
  val_dir: data/for-norm/validation
  test_dir: data/for-norm/testing
  model_dir: models
  model_name: best_model.pt
  reports_dir: reports
  figures_dir: reports/figures
